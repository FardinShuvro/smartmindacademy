{% load static %}
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্মার্ট মাইন্ড একাডেমি</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; }
        nav { background-color: #0056b3; color: white; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; }
        nav h1 { margin: 0; font-size: 24px; }
        nav ul { list-style: none; padding: 0; margin: 0; display: flex; }
        nav ul li { margin-left: 20px; }
        nav a { color: white; text-decoration: none; font-weight: bold; padding: 8px 15px; border-radius: 5px;}
        nav a:hover { background-color: #004494; }
        .login-btn { background-color: #ffcc00; color: #333; }
        .login-btn:hover { background-color: #e6b800; color: #333; }
        header { text-align: center; padding: 80px 20px; background: linear-gradient(to right, #ffffff, #e6f0fa); border-bottom: 2px solid #ddd; }
        header h2 { font-size: 36px; color: #0056b3; margin-bottom: 10px; }
        header p { font-size: 18px; color: #666; max-width: 600px; margin: 0 auto 20px auto; }
        .apply-btn { background-color: #28a745; color: white; padding: 12px 25px; text-decoration: none; font-size: 18px; border-radius: 5px; font-weight: bold; }
        .apply-btn:hover { background-color: #218838; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .section-title { text-align: center; color: #0056b3; margin-bottom: 30px; }
        .grid { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 200px; text-align: center; }
        .download-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; margin-top: 40px; }
        .download-btn { display: inline-block; background-color: #17a2b8; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin: 10px; }
        footer { background-color: #333; color: white; text-align: center; padding: 20px; margin-top: 40px; }
    </style>
</head>
<body>

    <nav>
        <a href="/bn/"><img src="{% static 'logo.png' %}" alt="স্মার্ট মাইন্ড একাডেমি" style="height: 150px;"></a>
        <ul>
            <li><a href="/bn/">হোম</a></li>
            <li><a href="/bn/subjects/">বিষয়সমূহ</a></li>
            <li><a href="/bn/resources/">রিসোর্স</a></li>
            <li><a href="/" style="background-color: #e74c3c; color: white;">English</a></li>
            <li><a href="#" class="login-btn">স্টুডেন্ট লগইন</a></li>
        </ul>
    </nav>

    {% block content %}
    {% endblock %}

    <footer>
        <p>&copy; 2026 স্মার্ট মাইন্ড একাডেমি। সর্বস্বত্ব সংরক্ষিত।</p>
    </footer>

</body>
</html>
